<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){try{
var t=localStorage.getItem('theme')||'light';
document.documentElement.setAttribute('data-theme',t);
var l=localStorage.getItem('lang')||'ar';
document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
document.documentElement.setAttribute('lang',l);
var isLogin=window.location.pathname==='/'||window.location.pathname==='/login';
if(!isLogin&&!localStorage.getItem('token')){document.documentElement.style.display='none';window.location.replace('/');}
}catch(e){}}());
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Enterprise Task Management</title>
    <meta name="description" content="Enterprise Task Management & Technical Support System - Login">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="css/style.css?v=9" rel="stylesheet">
    <script src="/js/preflight.js"></script>
</head>
<body>
    <div class="login-page">
        <div class="lang-switcher" style="position: absolute; top: 20px; right: 20px; z-index: 10;">
            <button class="btn btn-outline-light btn-sm" onclick="Lang.toggleLang()">
                <i class="fas fa-language me-1"></i> <span data-i18n="lang_en">English</span>
            </button>
        </div>
        <div class="login-card animate-fade-up">
            <div id="loginLogoContainer" class="text-center mb-3">
                <div class="logo-icon"><i class="fas fa-tasks"></i></div>
            </div>
            <h2 data-i18n="app_title">Enterprise Task Management</h2>
            <p class="subtitle" data-i18n="login_subtitle">Technical Support System</p>

            <div id="loginError" class="login-error"><i class="fas fa-exclamation-circle me-2"></i><span id="errorText"></span></div>

            <form id="loginForm" autocomplete="on">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" class="form-control" data-i18n-placeholder="login_username" placeholder="Username" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-control" data-i18n-placeholder="login_password" placeholder="Password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></button>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe" data-i18n="login_remember">Remember Me</label>
                    </div>
                    <a href="#" class="forgot-link" id="forgotPasswordLink" data-i18n="login_forgot_password">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginText" data-i18n="login_btn">Sign In</span>
                    <span id="loginSpinner" style="display:none"><i class="fas fa-spinner fa-spin me-2"></i><span data-i18n="loading">Signing in...</span></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
.user-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: green;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>
<body>
    <div class="user-avatar" id="userAvatar">A</div>
    <script>
        const avatarEl = document.getElementById('userAvatar');
        // A tiny transparent 1x1 gif base64
        const b64 = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        avatarEl.innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    </script>
</body>
</html>
